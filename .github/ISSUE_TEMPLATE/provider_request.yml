name: Provider request
description: Request support for a SaaS provider or platform.
title: "provider: "
labels: ["provider-request"]
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "Paddle"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - auth
        - billing
        - database
        - analytics
        - observability
        - email
        - storage
        - deploy
        - ai
        - other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: What should the adapter do?
  - type: textarea
    id: install-surface
    attributes:
      label: Install surface
      description: Which source files, routes, env vars, docs, checklist items, and maintenance skills should this adapter include?
      placeholder: "Client/helper files, webhook routes, console page, env keys, docs, tests/checklist, shared provider skill..."
  - type: dropdown
    id: readiness
    attributes:
      label: Expected readiness
      options:
        - stub
        - experimental
        - ready
        - stable
    validations:
      required: true
