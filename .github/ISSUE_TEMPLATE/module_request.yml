name: Module request
description: Request a new StackFoundry module.
title: "module: "
labels: ["module-request"]
body:
  - type: input
    id: module
    attributes:
      label: Module name
      placeholder: "stripe-billing"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What should this module install and why?
    validations:
      required: true
  - type: textarea
    id: systems
    attributes:
      label: Systems involved
      description: UI, routes, schemas, env, docs, tests, maintenance skills, providers.
  - type: dropdown
    id: readiness
    attributes:
      label: Expected readiness
      description: Is this a roadmap stub or an installable source module?
      options:
        - stub
        - experimental
        - ready
        - stable
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Recipe or install order
      description: Which recipe, preset, or install stage should include this module?
