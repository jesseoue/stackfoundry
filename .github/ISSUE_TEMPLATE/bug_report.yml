name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps to reproduce with a public/demo project.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Package version, registry URL, or commit SHA where the issue appears.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, pnpm version, and target framework/app.
  - type: checkboxes
    id: public-safety
    attributes:
      label: Public safety
      description: Keep reports safe for a public repository.
      options:
        - label: I did not include secrets, credentials, private customer data, provider account IDs, or raw production logs.
          required: true
